<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Moments in Motion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* ================= BODY LAYOUT ================= */
body{
  background:#0a0a0a;
  color:white;
  overflow-x:hidden;

  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ================= HEADER ================= */
header{
  height:65px;
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

/* ================= LOGO (RESTORED GLOW) ================= */
.logo{
  font-weight:700;
  font-size:1.3rem;
  cursor:pointer;
  transition:0.25s ease;
  animation:logoPulse 3s infinite ease-in-out;
}

.logo:hover{
  color:#7cf7ff;
  text-shadow:0 0 8px rgba(124,247,255,0.35);
  transform:scale(1.05);
}

@keyframes logoPulse{
  0%,100%{
    text-shadow:0 0 6px rgba(124,247,255,0.25);
  }
  50%{
    text-shadow:0 0 14px rgba(124,247,255,0.45);
  }
}

/* ================= MENU BUTTON ================= */
.menu-btn{
  font-size:1.5rem;
  cursor:pointer;
}

/* ================= NAV (MOBILE BASE) ================= */
nav{
  position:fixed;
  top:65px;
  right:-100%;
  width:180px;
  height:100vh;
  background:rgba(0,0,0,0.95);
  display:flex;
  flex-direction:column;
  padding:20px;
  transition:0.3s;
  z-index:999;
}

nav.active{
  right:0;
}

nav a{
  margin:10px 0;
  color:white;
  text-decoration:none;
  opacity:0.8;
  position:relative;
  transition:0.25s ease;
}

/* hover animation */
nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0%;
  height:1px;
  background:#7cf7ff;
  transition:0.25s ease;
}

nav a:hover{
  color:#7cf7ff;
}

nav a:hover::after{
  width:100%;
}

/* ================= MAIN 404 ================= */
.container{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:100px 20px 40px;
}

h1{
  font-size:6rem;
  color:#7cf7ff;
  text-shadow:0 0 15px rgba(124,247,255,0.3);
}

p{
  margin-top:10px;
  opacity:0.7;
  max-width:500px;
  line-height:1.5;
}

a.btn{
  margin-top:25px;
  padding:10px 18px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:8px;
  text-decoration:none;
  color:white;
  transition:0.25s ease;
}

a.btn:hover{
  background:#7cf7ff;
  color:#000;
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:20px;
  opacity:0.5;
  font-size:0.9rem;
  margin-top:auto;
}

/* ================= DESKTOP NAV ================= */
@media(min-width:768px){

  .menu-btn{
    display:none;
  }

  nav{
    position:static;
    height:auto;
    width:auto;
    flex-direction:row;
    background:none;
    padding:0;
    right:auto;
    gap:20px;
    align-items:center;
  }

  nav a{
    margin:0 10px;
  }
}

/* ================= MOBILE ================= */
@media(max-width:600px){
  h1{
    font-size:4rem;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">Sagar ✦</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <nav id="nav">
    <a href="index.html#Jaipur">Travel</a>
    <a href="index.html#Farewell">Farewell</a>
    <a href="index.html#Night">Night</a>
    <a href="https://dub.sh/AuroraWeb">Aurora</a>
  </nav>
</header>

<div class="container">
  <h1>404</h1>
  <p>
    This moment doesn’t exist in our memory archive.<br>
    It may have been lost somewhere in time.
  </p>

  <a class="btn" href="index.html">Return Home</a>

  <p style="opacity:0.4; margin-top:15px;">
    Redirecting in 5 seconds...
  </p>
</div>

<footer>
A visual memory archive by <strong>Sagar</strong> ✦ <br> © 2026 All rights reserved <br>
</footer>

<script>
function toggleMenu(){
  document.getElementById('nav').classList.toggle('active');
}

function goHome(){
  window.location.href = "index.html";
}

setTimeout(()=>{
  window.location.href = "index.html";
}, 5000);
</script>

</body>
</html>
