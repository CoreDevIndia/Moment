<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranav Sagar | Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#0a0a0a;
  color:white;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  width:90%;
  max-width:320px;
  padding:25px;
  border-radius:14px;
  background:#111;
  text-align:center;
}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#1a1a1a;
  color:white;
}

/* BUTTON */
button{
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:#00ffe0;
  color:black;
  font-weight:600;
  cursor:pointer;
}

/* DASHBOARD */
#app{
  display:none;
  max-width:900px;
  margin:0 auto;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h1{
  font-size:1.3rem;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:#111;
  padding:15px;
  border-radius:10px;
}

/* TEXT */
.label{
  font-size:0.8rem;
  opacity:0.6;
}

.value{
  font-size:1.5rem;
  margin:5px 0;
}

/* BAR */
.bar-bg{
  height:5px;
  background:#222;
  border-radius:3px;
  overflow:hidden;
}

.bar{
  height:100%;
  background:#00ffe0;
}

/* DEVICE */
.device{
  font-size:0.75rem;
  margin-top:6px;
}

/* MOBILE */
@media(max-width:600px){
  #app{
    padding:15px;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app">

  <div class="header">
    <h1>Analytics</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="grid">
    <div class="card" id="visits"></div>
    <div class="card" id="time"></div>
    <div class="card" id="clicks"></div>
    <div class="card" id="engagement"></div>
    <div class="card" id="devices"></div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAS77sCH7lVFk1WKsYr6dmWZUO15DymtQE",
  authDomain: "vlc-url.firebaseapp.com",
  projectId: "vlc-url",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
    .catch(err=>alert(err.message));
}

// LOGOUT
function logout(){
  auth.signOut();
  location.reload();
}

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadData();
  }
});

// LOAD DATA
function loadData(){

  let totalTime = 0;

  db.collection("memories_visits").onSnapshot(snap=>{
    visits.innerHTML = `
      <div class="label">Visitors</div>
      <div class="value">${snap.size}</div>
      <div class="bar-bg"><div class="bar" style="width:${snap.size*10}px"></div></div>
    `;
  });

  db.collection("memories_sessions").onSnapshot(snap=>{
    totalTime=0;
    snap.forEach(doc=> totalTime += doc.data().duration);

    let avg = snap.size ? Math.floor(totalTime/snap.size) : 0;

    time.innerHTML = `
      <div class="label">Time</div>
      <div class="value">${totalTime}s</div>
      <small>Avg: ${avg}s</small>
    `;
  });

  db.collection("memories_clicks").onSnapshot(snap=>{
    clicks.innerHTML = `
      <div class="label">Clicks</div>
      <div class="value">${snap.size}</div>
    `;
  });

  db.collection("memories_clicks").onSnapshot(c=>{
    db.collection("memories_sessions").onSnapshot(s=>{
      let score = Math.floor(c.size/(s.size||1));

      engagement.innerHTML = `
        <div class="label">Engagement</div>
        <div class="value">${score}</div>
      `;
    });
  });

  db.collection("memories_visits").onSnapshot(snap=>{
    let devices={};

    snap.forEach(doc=>{
      let d=doc.data();
      let key=d.screen||"unknown";
      devices[key]=(devices[key]||0)+1;
    });

    let html = `<div class="label">Devices</div>`;

    for(let [k,v] of Object.entries(devices)){
      html += `<div class="device">${k}: ${v}</div>`;
    }

    document.getElementById("devices").innerHTML = html;
  });
}
</script>

</body>
</html>
